<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星图达人需求分析系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; border-radius: 12px; margin-bottom: 24px; }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { opacity: 0.9; font-size: 14px; }
    .card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
    .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
    .upload-area.dragover { border-color: #667eea; background: #f0f2ff; }
    .upload-icon { font-size: 48px; color: #667eea; margin-bottom: 12px; }
    .upload-text { color: #666; font-size: 14px; }
    .upload-text strong { color: #667eea; }
    .btn { padding: 10px 24px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.2s; }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5568d3; }
    .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
    .btn-secondary { background: #f0f0f0; color: #666; }
    .btn-secondary:hover { background: #e0e0e0; }
    .file-info { display: flex; align-items: center; gap: 12px; padding: 16px; background: #f8f9ff; border-radius: 8px; margin-top: 16px; }
    .file-icon { width: 40px; height: 40px; background: #667eea; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    .file-details { flex: 1; }
    .file-name { font-weight: 500; color: #333; }
    .file-size { font-size: 12px; color: #999; }
    .btn-group { display: flex; gap: 12px; margin-top: 20px; }
    .process-step { display: flex; align-items: center; gap: 16px; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
    .step-num { width: 32px; height: 32px; background: #667eea; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; }
    .step-num.done { background: #52c41a; }
    .step-num.active { background: #faad14; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    .step-content { flex: 1; }
    .step-title { font-weight: 500; color: #333; }
    .step-desc { font-size: 12px; color: #999; margin-top: 4px; }
    .result-box { background: #f8f9fa; border-radius: 8px; padding: 20px; margin-top: 16px; }
    .result-section { margin-bottom: 20px; }
    .result-section:last-child { margin-bottom: 0; }
    .result-label { font-weight: 600; color: #667eea; margin-bottom: 8px; font-size: 14px; }
    .result-content { background: white; border-radius: 6px; padding: 16px; font-size: 14px; line-height: 1.8; color: #333; white-space: pre-wrap; border: 1px solid #e8e8e8; }
    .keyword-tag { display: inline-block; background: #667eea; color: white; padding: 4px 12px; border-radius: 16px; font-size: 13px; margin: 4px; }
    .keyword-tag.outside { background: #52c41a; }
    .keyword-tag.common { background: #faad14; color: #333; }
    .loading { text-align: center; padding: 40px; color: #666; }
    .spinner { width: 40px; height: 40px; border: 3px solid #f0f0f0; border-top-color: #667eea; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #f5222d; padding: 16px; background: #fff1f0; border-radius: 8px; margin-top: 16px; }
    .config-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
    .config-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .config-label { width: 100px; font-size: 14px; color: #666; }
    .config-input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .config-input:focus { outline: none; border-color: #667eea; }
    .json-output { background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: 8px; overflow-x: auto; font-family: 'Monaco', 'Menlo', monospace; font-size: 13px; line-height: 1.6; }
    .json-key { color: #9cdcfe; }
    .json-string { color: #ce9178; }
    .json-number { color: #b5cea8; }
    .history-item { padding: 12px 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: background 0.2s; }
    .history-item:hover { background: #f0f0f0; }
    .history-title { font-weight: 500; color: #333; }
    .history-time { font-size: 12px; color: #999; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
